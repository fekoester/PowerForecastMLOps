name: CI - Forecasting Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-run-pipeline:
    runs-on: ubuntu-latest

    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: |
          make test

      - name: Run full forecasting pipeline
        run: |
          make run-all

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            reports/metrics/*.json
            reports/figures/*.png
            reports/monitoring/*.md
            reports/monitoring/*.html
          if-no-files-found: warn

      - name: Upload predictions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: |
            data/predictions/*.csv
          if-no-files-found: warn

      - name: Prepare GitHub Pages site
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p public
          cp reports/monitoring/latest_report.html public/index.html
          mkdir -p public/figures
          cp reports/figures/*.png public/figures/

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
