name: CI - Forecasting Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-and-run-pipeline:
    runs-on: ubuntu-latest

    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: |
          make test

      - name: Run full forecasting pipeline
        run: |
          make run-all

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            reports/metrics/*.json
            reports/figures/*.png
            reports/monitoring/*.md
            reports/monitoring/*.html
          if-no-files-found: warn

      - name: Upload predictions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: |
            data/predictions/*.csv
          if-no-files-found: warn
